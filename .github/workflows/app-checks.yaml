  #     - run: go build ./cmd/server

  frontend:
    runs-on: cloud-run
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

